<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Feedback Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 500px;
            margin: auto;
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        img {
            width: 200px;
            border: 3px solid black;
            border-radius: 10px;
            cursor: pointer;
        }

        #fee, #message, #charCount {
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Event Feedback Form</h2>

        <!-- Phone Number -->
        <label>Phone Number</label>
        <input type="text"
               id="phone"
               placeholder="Enter 10-digit number"
               onblur="validatePhone()">

        <!-- Event Selection -->
        <label>Select Event</label>
        <select id="eventType" onchange="showFee()">
            <option value="">Choose Event</option>
            <option value="100">Music Festival</option>
            <option value="200">Sports Event</option>
            <option value="150">Food Fair</option>
        </select>

        <p id="fee"></p>

        <!-- Feedback Textarea -->
        <label>Feedback</label>
        <textarea id="feedback"
                  rows="5"
                  placeholder="Enter your feedback"
                  onkeyup="countCharacters()"></textarea>

        <p id="charCount">Characters: 0</p>

        <!-- Submit Button -->
        <button onclick="showConfirmation()">
            Submit Feedback
        </button>

        <p id="message"></p>

        function validatePhone() {

            let phone = document.getElementById("phone").value;

            if(phone.length != 10 || isNaN(phone)) {
                alert("Please enter a valid 10-digit phone number");
            }
        }

        /* onchange event */
        function showFee() {

            let fee = document.getElementById("eventType").value;

            document.getElementById("fee").innerHTML =
                "Event Fee: ₹" + fee;
        }

        /* onclick event */
        function showConfirmation() {

            document.getElementById("message").innerHTML =
                "Feedback Submitted Successfully!";
        }

        /* ondblclick event */
        function enlargeImage() {

            let image = document.getElementById("eventImage");

            image.style.width = "350px";
        }

        /* keyboard event */
        function countCharacters() {

            let text =
                document.getElementById("feedback").value;

            document.getElementById("charCount").innerHTML =
                "Characters: " + text.length;
        }

    </script>

</body>
</html>

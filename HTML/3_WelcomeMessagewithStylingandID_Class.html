<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        /* ID Styling */
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        /* Class Styling */
        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 3px;
        }
    </style>
</head>

<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        Welcome Back, Resident!
    </div>

    <br>

    <p>
        Register now for upcoming community events.
    </p>

    <p class="highlight">
        Early registrations get priority access.
    </p>

    <p>
        Special Offer:
        <span style="color: red; font-weight: bold;">
            Free entry for first 50 users!!! Grab it fast...
        </span>
    </p>

    <p class="highlight">
        Contact support for more details.
    </p>

</body>
</html>
